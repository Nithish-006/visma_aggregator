<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | VISMA Financial</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='projects.css') }}">
</head>

<body>
    <header class="proj-header">
        <div class="proj-header-left">
            <a href="/" class="proj-back-btn" title="Back to Hub">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <div class="proj-title-block">
                <h1 class="proj-title">Projects</h1>
                <span class="proj-subtitle">Canonical project registry — id and stem name</span>
            </div>
        </div>
        <div class="proj-header-right">
            <button id="new-project-btn" class="proj-primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>New Project</span>
            </button>
        </div>
    </header>

    <main class="proj-main">
        <div id="projects-list" class="projects-list">
            <div class="proj-loading">Loading…</div>
        </div>
    </main>

    <!-- ==== New project modal ==== -->
    <div id="new-project-modal" class="proj-modal hidden" role="dialog" aria-modal="true">
        <div class="proj-modal-backdrop" data-close="new-project-modal"></div>
        <div class="proj-modal-card">
            <div class="proj-modal-header">
                <h2>New Project</h2>
                <button class="proj-modal-close" data-close="new-project-modal" aria-label="Close">×</button>
            </div>
            <form id="new-project-form" class="proj-modal-body">
                <label class="proj-field-label">Project</label>
                <div class="proj-split-row">
                    <input id="new-project-id" name="id" class="proj-input proj-input-id" type="number" min="1" placeholder="ID" autocomplete="off" required>
                    <span class="proj-split-dash">−</span>
                    <input id="new-project-stem" name="stem_name" class="proj-input proj-input-stem" type="text" placeholder="Project name" autocomplete="off" required>
                </div>
                <p id="new-project-collision" class="proj-collision hidden"></p>

                <label class="proj-field-label" for="new-project-po">PO document <span class="proj-optional">(optional — can upload later)</span></label>
                <input id="new-project-po" name="po_file" class="proj-file-input" type="file" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.docx,.doc">

                <div class="proj-modal-footer">
                    <button type="button" class="proj-secondary-btn" data-close="new-project-modal">Cancel</button>
                    <button type="submit" id="new-project-submit" class="proj-primary-btn">Save</button>
                </div>
                <p id="new-project-error" class="proj-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- ==== Project detail / upload modal ==== -->
    <div id="project-detail-modal" class="proj-modal hidden" role="dialog" aria-modal="true">
        <div class="proj-modal-backdrop" data-close="project-detail-modal"></div>
        <div class="proj-modal-card">
            <div class="proj-modal-header">
                <h2 id="detail-title">Project</h2>
                <button class="proj-modal-close" data-close="project-detail-modal" aria-label="Close">×</button>
            </div>
            <div class="proj-modal-body">
                <div id="detail-po-existing" class="hidden">
                    <p class="proj-field-label">Purchase Order</p>
                    <div class="proj-po-row">
                        <span id="detail-po-filename" class="proj-po-filename"></span>
                        <a id="detail-po-link" class="proj-secondary-btn" href="#" target="_blank" rel="noopener">View</a>
                    </div>

                    <!-- Extracted PO gist -->
                    <div id="detail-po-gist" class="proj-po-gist">
                        <div class="proj-gist-loading">Loading PO details…</div>
                    </div>

                    <!-- Inline edit form (hidden until Edit clicked) -->
                    <form id="detail-po-edit-form" class="proj-po-edit hidden">
                        <div class="proj-gist-grid">
                            <label>Total project value (₹)
                                <input name="total_value" type="number" step="0.01" min="0" class="proj-input">
                            </label>
                            <label>PO number
                                <input name="po_number" type="text" class="proj-input">
                            </label>
                            <label>PO date
                                <input name="po_date" type="text" placeholder="DD-MMM-YYYY" class="proj-input">
                            </label>
                            <label>Client
                                <input name="client_name" type="text" class="proj-input">
                            </label>
                            <label>Taxable value (₹)
                                <input name="taxable_value" type="number" step="0.01" min="0" class="proj-input">
                            </label>
                            <label>Total tax (₹)
                                <input name="total_tax" type="number" step="0.01" min="0" class="proj-input">
                            </label>
                        </div>
                        <div class="proj-modal-footer">
                            <button type="button" id="detail-po-edit-cancel" class="proj-secondary-btn">Cancel</button>
                            <button type="submit" class="proj-primary-btn">Save changes</button>
                        </div>
                        <p id="detail-po-edit-error" class="proj-error hidden"></p>
                    </form>

                    <div id="detail-po-actions" class="proj-modal-footer proj-po-actions">
                        <button type="button" id="detail-po-reprocess" class="proj-secondary-btn">Reprocess</button>
                        <button type="button" id="detail-po-edit-btn" class="proj-primary-btn">Edit values</button>
                    </div>
                    <p class="proj-note">PO file is locked to keep naming consistent. You can reprocess the file or correct the extracted values.</p>
                </div>
                <div id="detail-po-upload">
                    <p class="proj-field-label" id="detail-upload-label">Upload PO document</p>
                    <form id="detail-upload-form">
                        <input id="detail-po-input" name="po_file" class="proj-file-input" type="file" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.docx,.doc" required>
                        <div class="proj-modal-footer">
                            <button type="button" class="proj-secondary-btn" data-close="project-detail-modal">Close</button>
                            <button type="submit" class="proj-primary-btn">Upload PO</button>
                        </div>
                        <p id="detail-upload-error" class="proj-error hidden"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="proj-toast" class="proj-toast hidden"></div>

    <script src="{{ url_for('static', filename='projects.js') }}"></script>
</body>

</html>

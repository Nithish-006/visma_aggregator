<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Login | Visma Financials</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='favicon.jpg') }}">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Light Theme - Elegant Gradients */
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #059669;
            --bg-dark: linear-gradient(160deg, #f0f4f8 0%, #d9e2ec 100%);
            --bg-card: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            --text-main: #1a1a2e;
            --text-secondary: #4a4a68;
            --border-color: #e5e7eb;
            --border-strong: #d1d5db;
            --error-color: #dc2626;
            --success-color: #059669;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            letter-spacing: -0.01em;
        }

        /* Elegant gradient background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0.05;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(99, 102, 241, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244, 114, 182, 0.12) 0%, transparent 55%);
            animation: bgPulse 20s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(2deg); }
        }

        /* Floating particles - Very subtle */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--border-strong);
            border-radius: 50%;
            opacity: 0.15;
            animation: float 30s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 35s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 30s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 38s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 32s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 34s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 36s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 31s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 33s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 37s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* Login container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
            animation: cardSlideUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo and branding - Gradient */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 30px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35), 0 4px 8px rgba(118, 75, 162, 0.2);
        }

        .login-title {
            font-size: 1.625rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a1a2e 0%, #4a4a68 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Form styles */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
            transition: color 0.3s ease;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #fafafa;
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input:focus + .input-icon,
        .form-group:focus-within label {
            color: var(--primary-color);
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: var(--primary-color);
        }

        /* Submit button - Gradient */
        .login-btn {
            position: relative;
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 12px;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.45), 0 4px 12px rgba(118, 75, 162, 0.3);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
        }

        .btn-text {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--error-color);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .error-icon {
            font-size: 18px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .login-footer p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .login-footer span {
            color: var(--primary-light);
        }

        /* Responsive - Tablets */
        @media (max-width: 768px) {
            .login-container {
                padding: 16px;
            }

            .login-card {
                padding: 40px 28px;
            }
        }

        /* Responsive - Mobile */
        @media (max-width: 480px) {
            .login-container {
                padding: 12px;
            }

            .login-card {
                padding: 32px 20px;
                border-radius: 20px;
            }

            .login-header {
                margin-bottom: 32px;
            }

            .logo-icon {
                width: 56px;
                height: 56px;
                font-size: 26px;
                border-radius: 16px;
                margin-bottom: 16px;
            }

            .login-title {
                font-size: 1.4rem;
            }

            .login-subtitle {
                font-size: 0.85rem;
            }

            .login-form {
                gap: 16px;
            }

            .form-group label {
                font-size: 0.8rem;
            }

            .form-input {
                padding: 12px 14px 12px 44px;
                font-size: 16px; /* Prevents zoom on iOS */
            }

            .input-icon {
                left: 14px;
                font-size: 16px;
            }

            .password-toggle {
                right: 12px;
            }

            .login-btn {
                padding: 14px 20px;
                font-size: 0.95rem;
                min-height: 50px;
            }

            .login-footer {
                margin-top: 24px;
                padding-top: 20px;
            }

            .error-message {
                padding: 10px 14px;
                font-size: 0.85rem;
            }

            /* Reduce particle count on mobile for performance */
            .particle:nth-child(n+6) {
                display: none;
            }
        }

        /* Very small screens */
        @media (max-width: 360px) {
            .login-card {
                padding: 28px 16px;
            }

            .login-title {
                font-size: 1.25rem;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }

        /* Landscape phone */
        @media (max-height: 500px) and (orientation: landscape) {
            .login-card {
                padding: 24px 32px;
            }

            .login-header {
                margin-bottom: 20px;
            }

            .logo-icon {
                width: 48px;
                height: 48px;
                font-size: 22px;
                margin-bottom: 12px;
            }

            .login-form {
                gap: 12px;
            }

            .login-footer {
                margin-top: 16px;
                padding-top: 12px;
            }
        }

        /* Remember me checkbox */
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
            cursor: pointer;
            border-radius: 4px;
        }

        .remember-me label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s ease;
        }

        .remember-me:hover label {
            color: var(--text-main);
        }

        /* Loading state */
        .login-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .login-btn.loading .btn-text {
            visibility: hidden;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-icon">
                    <span>&#8377;</span>
                </div>
                <h1 class="login-title">Visma Financials</h1>
                <p class="login-subtitle">Sign in to access your financial dashboard</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="error-message">
                <span class="error-icon">&#9888;</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form class="login-form" method="POST" action="/login" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input"
                            placeholder="Enter your username"
                            autocomplete="username"
                            required
                        >
                        <span class="input-icon">&#128100;</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                        <span class="input-icon">&#128274;</span>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <span id="toggleIcon">&#128065;</span>
                        </button>
                    </div>
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember_me" name="remember_me">
                    <label for="remember_me">Stay signed in</label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">
                        <span>Sign In</span>
                        <span>&#10140;</span>
                    </span>
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Powered by <span>Visma Finance</span></p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerHTML = '&#128064;'; // Open eye
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerHTML = '&#128065;'; // Eye with line
            }
        }

        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
        });

        // Add input animation on focus
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('focused');
            });
        });
    </script>
</body>

</html>

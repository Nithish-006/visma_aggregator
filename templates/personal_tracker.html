<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='favicon.jpg') }}">
    <title>Expense Tracker | VISMA Financial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='personal_tracker.css') }}">
</head>

<body>
    <!-- Header with Month Navigator -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="back-btn" title="Back to Hub">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <div class="month-nav">
                <button class="month-btn" id="prev-month">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <span class="month-label" id="current-month">Jan 2026</span>
                <button class="month-btn" id="next-month">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 6 15 12 9 18"></polyline>
                    </svg>
                </button>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="search-toggle" title="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <a href="/logout" class="icon-btn" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </a>
        </div>
    </header>

    <!-- Search Bar (Hidden by default) -->
    <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="Search transactions...">
        <button class="search-close" id="search-close">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
        <button class="tab active" data-tab="daily">Daily</button>
        <button class="tab" data-tab="monthly">Monthly</button>
        <button class="tab" data-tab="total">Total</button>
        <button class="tab" data-tab="projects">Projects</button>
    </nav>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="bank-filter">
            <button class="bank-btn active" data-bank="all">All</button>
            <button class="bank-btn axis" data-bank="axis">AXIS</button>
            <button class="bank-btn kvb" data-bank="kvb">KVB</button>
        </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar">
        <div class="summary-item">
            <span class="summary-label">Income</span>
            <span class="summary-value income" id="summary-income">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Expenses</span>
            <span class="summary-value expense" id="summary-expense">0.00</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Daily View (Default) -->
        <div class="tab-content active" id="tab-daily">
            <div class="transactions-list" id="daily-transactions">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Monthly View -->
        <div class="tab-content" id="tab-monthly">
            <div class="monthly-list" id="monthly-breakdown">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Total View -->
        <div class="tab-content" id="tab-total">
            <div class="total-summary" id="total-summary">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Projects View -->
        <div class="tab-content" id="tab-projects">
            <div class="projects-list" id="projects-breakdown">
                <div class="loading-state">Loading...</div>
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="fab-add" aria-label="Add Transaction">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Add/Edit Modal -->
    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Transaction</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                    <input type="hidden" id="transaction-id">

                    <!-- Transaction Type Toggle -->
                    <div class="form-group type-group">
                        <div class="type-bubbles">
                            <button type="button" class="type-bubble expense active" id="type-expense-btn" data-type="expense">Expense</button>
                            <button type="button" class="type-bubble income" id="type-income-btn" data-type="income">Income</button>
                        </div>
                        <input type="hidden" id="transaction-type" value="expense">
                    </div>

                    <!-- Bank Selection -->
                    <div class="form-group bank-group">
                        <label>Bank</label>
                        <div class="bank-bubbles">
                            <button type="button" class="bank-bubble axis" id="bank-axis-btn" data-bank="axis">AXIS</button>
                            <button type="button" class="bank-bubble kvb" id="bank-kvb-btn" data-bank="kvb">KVB</button>
                        </div>
                        <input type="hidden" id="transaction-bank" value="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="transaction-date">Date</label>
                            <input type="date" id="transaction-date" required>
                        </div>
                        <div class="form-group">
                            <label for="transaction-amount">Amount</label>
                            <input type="number" id="transaction-amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-vendor">Vendor</label>
                        <div class="custom-dropdown" id="vendor-dropdown">
                            <input type="text" id="transaction-vendor" placeholder="Enter vendor name" autocomplete="off" required>
                            <div class="dropdown-menu" id="vendor-menu"></div>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-description">Description</label>
                        <div class="custom-dropdown" id="description-dropdown">
                            <input type="text" id="transaction-description" placeholder="Optional description" autocomplete="off">
                            <div class="dropdown-menu" id="description-menu"></div>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-project">Project</label>
                        <div class="custom-dropdown" id="project-dropdown">
                            <input type="text" id="transaction-project" placeholder="General" autocomplete="off">
                            <div class="dropdown-menu" id="project-menu"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="button" class="btn btn-danger" id="delete-btn" style="display: none;">Delete</button>
                        <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="delete-modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Delete Transaction?</h3>
                <button class="modal-close" id="delete-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p class="delete-info" id="delete-info"></p>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="delete-cancel-btn">Cancel</button>
                    <button type="button" class="btn btn-danger" id="delete-confirm-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message" id="toast-message"></span>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='personal_tracker.js') }}"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <title>Expense Tracker | VISMA Financial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='personal_tracker.css') }}">
</head>

<body>
    <!-- Header with Month Navigator -->
    <header class="header">
        <div class="header-left">
            <a href="/" class="back-btn" title="Back to Hub">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </a>
            <div class="month-nav">
                <button class="month-btn" id="prev-month">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <span class="month-label" id="current-month">Jan 2026</span>
                <button class="month-btn" id="next-month">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 6 15 12 9 18"></polyline>
                    </svg>
                </button>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="search-toggle" title="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="icon-btn" id="export-btn" title="Export Excel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
            <a href="/logout" class="icon-btn" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </a>
        </div>
    </header>

    <!-- Search Bar (Hidden by default) -->
    <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="Search transactions...">
        <button class="search-close" id="search-close">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
        <button class="tab active" data-tab="daily">Daily</button>
        <button class="tab" data-tab="monthly">Monthly</button>
        <button class="tab" data-tab="total">Total</button>
        <button class="tab" data-tab="projects">Projects</button>
    </nav>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="bank-filter">
            <button class="bank-btn active" data-bank="all">All</button>
            <button class="bank-btn axis" data-bank="axis">AXIS</button>
            <button class="bank-btn kvb" data-bank="kvb">KVB</button>
        </div>
    </div>

    <!-- Summary Bar -->
    <div class="summary-bar">
        <div class="summary-item">
            <span class="summary-label">Income</span>
            <span class="summary-value income" id="summary-income">0.00</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">Expenses</span>
            <span class="summary-value expense" id="summary-expense">0.00</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Daily View (Default) -->
        <div class="tab-content active" id="tab-daily">
            <div class="transactions-list" id="daily-transactions">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Monthly View -->
        <div class="tab-content" id="tab-monthly">
            <div class="monthly-list" id="monthly-breakdown">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Total View -->
        <div class="tab-content" id="tab-total">
            <div class="total-summary" id="total-summary">
                <div class="loading-state">Loading...</div>
            </div>
        </div>

        <!-- Projects View -->
        <div class="tab-content" id="tab-projects">
            <div class="projects-list" id="projects-breakdown">
                <div class="loading-state">Loading...</div>
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button class="fab" id="fab-add" aria-label="Add Transaction">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Add/Edit Modal -->
    <div class="modal" id="transaction-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Transaction</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                    <input type="hidden" id="transaction-id">

                    <!-- Transaction Type Toggle -->
                    <div class="form-group type-group">
                        <div class="type-bubbles">
                            <button type="button" class="type-bubble expense active" id="type-expense-btn" data-type="expense">Expense</button>
                            <button type="button" class="type-bubble income" id="type-income-btn" data-type="income">Income</button>
                        </div>
                        <input type="hidden" id="transaction-type" value="expense">
                    </div>

                    <!-- Bank Selection -->
                    <div class="form-group bank-group">
                        <label>Bank</label>
                        <div class="bank-bubbles">
                            <button type="button" class="bank-bubble axis" id="bank-axis-btn" data-bank="axis">AXIS</button>
                            <button type="button" class="bank-bubble kvb" id="bank-kvb-btn" data-bank="kvb">KVB</button>
                        </div>
                        <input type="hidden" id="transaction-bank" value="">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="transaction-date">Date</label>
                            <input type="date" id="transaction-date" required>
                        </div>
                        <div class="form-group">
                            <label for="transaction-amount">Amount</label>
                            <input type="number" id="transaction-amount" step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-vendor">Vendor</label>
                        <div class="custom-dropdown" id="vendor-dropdown">
                            <input type="text" id="transaction-vendor" placeholder="Enter vendor name" autocomplete="off" required>
                            <div class="dropdown-menu" id="vendor-menu"></div>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-description">Description</label>
                        <div class="custom-dropdown" id="description-dropdown">
                            <input type="text" id="transaction-description" placeholder="Optional description" autocomplete="off">
                            <div class="dropdown-menu" id="description-menu"></div>
                        </div>
                    </div>

                    <div class="form-group dropdown-group">
                        <label for="transaction-project">Project</label>
                        <div class="custom-dropdown" id="project-dropdown">
                            <input type="text" id="transaction-project" placeholder="General" autocomplete="off">
                            <div class="dropdown-menu" id="project-menu"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="button" class="btn btn-danger" id="delete-btn" style="display: none;">Delete</button>
                        <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="delete-modal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Delete Transaction?</h3>
                <button class="modal-close" id="delete-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p class="delete-info" id="delete-info"></p>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="delete-cancel-btn">Cancel</button>
                    <button type="button" class="btn btn-danger" id="delete-confirm-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message" id="toast-message"></span>
    </div>

    <!-- Slide-in Panel for Add/Edit -->
    <div class="slide-panel-overlay" id="slide-panel-overlay"></div>
    <div class="slide-panel" id="slide-panel">
        <div class="slide-panel-header">
            <button class="slide-panel-back" id="slide-panel-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <h2 class="slide-panel-title" id="slide-panel-title">Add Transaction</h2>
            <div class="slide-panel-spacer"></div>
        </div>
        <div class="slide-panel-content">
            <form id="panel-form" class="panel-form">
                <input type="hidden" id="panel-transaction-id">

                <!-- Transaction Type Toggle -->
                <div class="panel-section">
                    <label class="panel-label">Transaction Type</label>
                    <div class="panel-type-toggle">
                        <button type="button" class="panel-type-btn expense active" data-type="expense">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <polyline points="19 12 12 19 5 12"></polyline>
                            </svg>
                            Expense
                        </button>
                        <button type="button" class="panel-type-btn income" data-type="income">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="5 12 12 5 19 12"></polyline>
                            </svg>
                            Income
                        </button>
                    </div>
                    <input type="hidden" id="panel-transaction-type" value="expense">
                </div>

                <!-- Bank Selection -->
                <div class="panel-section">
                    <label class="panel-label">Bank Account <span class="panel-optional">(Optional)</span></label>
                    <div class="panel-bank-toggle">
                        <button type="button" class="panel-bank-btn axis" data-bank="axis">AXIS</button>
                        <button type="button" class="panel-bank-btn kvb" data-bank="kvb">KVB</button>
                    </div>
                    <input type="hidden" id="panel-transaction-bank" value="">
                </div>

                <!-- Date & Amount Row -->
                <div class="panel-section panel-row">
                    <div class="panel-field">
                        <label for="panel-transaction-date" class="panel-label">Date</label>
                        <input type="date" id="panel-transaction-date" class="panel-input" required>
                    </div>
                    <div class="panel-field">
                        <label for="panel-transaction-amount" class="panel-label">Amount</label>
                        <div class="panel-amount-wrapper">
                            <span class="panel-currency">&#8377;</span>
                            <input type="number" id="panel-transaction-amount" class="panel-input panel-amount-input"
                                   step="0.01" min="0.01" placeholder="0.00" required>
                        </div>
                    </div>
                </div>

                <!-- Vendor Field -->
                <div class="panel-section">
                    <label for="panel-transaction-vendor" class="panel-label">Vendor / Payee</label>
                    <div class="panel-dropdown" id="panel-vendor-dropdown">
                        <input type="text" id="panel-transaction-vendor" class="panel-input"
                               placeholder="Enter vendor name" autocomplete="off" required>
                        <div class="panel-pills" id="panel-vendor-pills"></div>
                    </div>
                </div>

                <!-- Description Field -->
                <div class="panel-section">
                    <label for="panel-transaction-description" class="panel-label">Description <span class="panel-optional">(Optional)</span></label>
                    <div class="panel-dropdown" id="panel-description-dropdown">
                        <input type="text" id="panel-transaction-description" class="panel-input"
                               placeholder="Add a note" autocomplete="off">
                        <div class="panel-pills" id="panel-description-pills"></div>
                    </div>
                </div>

                <!-- Project Field -->
                <div class="panel-section">
                    <label for="panel-transaction-project" class="panel-label">Project <span class="panel-optional">(Optional)</span></label>
                    <div class="panel-dropdown" id="panel-project-dropdown">
                        <input type="text" id="panel-transaction-project" class="panel-input"
                               placeholder="General" autocomplete="off">
                        <div class="panel-pills" id="panel-project-pills"></div>
                    </div>
                </div>
            </form>
        </div>
        <!-- Normal Footer (Form Actions) -->
        <div class="slide-panel-footer" id="panel-footer-normal">
            <button type="button" class="panel-btn panel-btn-delete" id="panel-delete-btn" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Delete
            </button>
            <button type="submit" form="panel-form" class="panel-btn panel-btn-save" id="panel-save-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Save
            </button>
        </div>

        <!-- Delete Confirmation Footer (shown when confirming delete) -->
        <div class="slide-panel-footer panel-delete-confirm" id="panel-footer-delete" style="display: none;">
            <div class="panel-delete-message">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span>Delete this transaction?</span>
            </div>
            <div class="panel-delete-actions">
                <button type="button" class="panel-btn panel-btn-cancel" id="panel-delete-cancel">Cancel</button>
                <button type="button" class="panel-btn panel-btn-confirm-delete" id="panel-delete-confirm">Delete</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='personal_tracker.js') }}"></script>
    <script src="/static/pwa-register.js"></script>
</body>

</html>
